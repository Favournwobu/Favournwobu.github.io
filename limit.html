<!DOCTYPE html>
<html lang="en-US">
  <head>
  <title>images</title>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Favour Nwobu">
    <style>
    div.football {
      filter: grayscale(100%);
      border:60px  solid transparent;
      border-image:url(images-folder/tic-tac-toe.png)53 round;
      display:inline-block;
    }
    div.penguin {
      border-radius:75%;
      display:inline-block;
      overflow:hidden;
      border:1px solid black;
    }
    div.dinosaur {
      filter:drop-shadow(10px 10px 5px #000000);
      filter:hue-rotate(90deg)
    }
    div.seagull {
      background:linear-gradient(to bottom right, lightblue, white);
      padding:30px;
      display:inline-block;
      box-shadow: 5px 15px 10px gray;
    }
    div.butterfly {
      border-radius: 100px 0 100px 0;
      overflow:hidden;
      display:inline-block;
      filter:invert(80%);
    }
    div.stage { 
      filter:blur(5px);
      position:relative;
      display:inline-block;
    }
    div.overlay {
      position: absolute;
      top: 100px;
      left:100px;
      color: white;
      font-weight:bold;
      font-size:56px;
      text-shadow:2px 2px 4px black;
      font-family: sans-serif;
    }
    </style>
  </head>
  <body>
    <h1>Edited images!</h1> 
     </div>   
    <div class="stage">
      <img src="images-folder/theater_stage.jpg" alt ="theater">
    </div>
    <div class="overlay">
      <p>Presenting</p>
    </div>
    <div class="football">
      <img src="images-folder/football_field.jpg" alt ="football feild with tic-tac-toe border">
    </div>
    <div class="penguin">
      <img src="images-folder/penguins.jpg" alt ="penguin image">
    </div>
     <div class="dinosaur">
      <img src="images-folder/dinosaur.png" alt ="dinosaur image">
    </div>
    <div class="seagull">
      <img src="images-folder/seagull.png" alt ="seagull image">
    </div>
    <div class="butterfly">
      <img src="images-folder/butterfly.jpg" alt ="butterfly">
    <a href="index.html">return to homepage</a>
  </body>
</html>
