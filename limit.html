<!DOCTYPE html>
<html lang="en-US">
  <head>
  <title>images</title>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Favour Nwobu">
    <style>
    div.football {
      filter: grayscale(100%);
      border:60px  solid transparent;
      border-image:url(images-folder/tic-tac-toe.png)53 round;
      display:inline-block;
    }
    div.penguin {
      border-radius:100%;
      display:inline-block;
      overflow:hidden;
      border:1px solid black;
    }
    div.dinosaur {
      filter:drop-shadow(10px 10px 5px #000000) hue-rotate(90deg);
    }
    div.seagull {
      background:linear-gradient(to bottom right, lightblue, white);
      padding:30px;
      display:inline-block;
      box-shadow: 3px 15px 10px gray;
      margin-bottom:50px;
    }
    div.butterfly {
      border-radius: 100px 0 100px 0;
      overflow:hidden;
      display:inline-block;
      filter:invert(80%);
    }
    div.stage { 
      filter:blur(5px);
      position:relative;
      display:inline-block;
      top:10px;
      left:10px;
      margin-bottom:50px;
    }
    div.overlay {
      position:absolute;
      top:180px;
      left:90px;
      color: white;
      font-weight:bold;
      font-size:50px;
      text-shadow:2px 2px 4px black;
      font-family:sans-serif;
    }
    </style>
  </head>
  <body>
    <h1>Edited images!</h1>  
    <div class="stage">
      <img src="images-folder/theater_stage.jpg" alt ="theater with presenting text overlay">
    </div>
    <br>
    <div class="overlay">
      <p>Presenting</p>
    </div>
    <br>
    <div class="football">
      <img src="images-folder/football_field.jpg" alt ="football feild with tic-tac-toe border">
    </div>
    <br>
    <div class="penguin">
      <img src="images-folder/penguins.jpg" alt ="penguin image">
    </div>
    <br>
     <div class="dinosaur">
      <img src="images-folder/dinosaur.png" alt ="dinosaur image with shadow">
    </div>
    <br>
    <div class="seagull">
      <img src="images-folder/seagull.png" alt ="seagull image">
    </div>
    <br>
    <div class="butterfly">
      <img src="images-folder/butterfly.jpg" alt ="inverted butterfly">
    </div>
    <br>
    <a href="index.html">return to homepage</a>
  </body>
</html>
